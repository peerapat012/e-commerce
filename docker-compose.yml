version: "3.9"

services:
  api:
    build: .
    container_name: ecommerce-api
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ecommerce
      RABBITMQ_URL: amqp://user:pass@rabbitmq:5672
    command: nodemon src/server.ts
    env_file:
      - .env.docker

  worker:
    build: .
    container_name: ecommerce-worker
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
      - rabbitmq
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ecommerce
      RABBITMQ_URL: amqp://user:pass@rabbitmq:5672
    command: nodemon src/worker.ts
    env_file:
      - .env.docker

  postgres:
    image: postgres:18
    container_name: ecommerce-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4:9.8
    ports:
      - 5050:80
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ecommerce-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: pass
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data: